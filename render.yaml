previewsEnabled: false

services:
  - name: ai-voice-backend
    type: web
    runtime: python310
    buildCommand: "pip install --no-cache-dir -r backend/requirements.txt"
    startCommand: "python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: "backend"
    envVars:
      - key: GEMINI_API_KEY
        fromServiceSecret: true
      - key: FRONTEND_URL
        value: https://frontend-jade-nine-64.vercel.app